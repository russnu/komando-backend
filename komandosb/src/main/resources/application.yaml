server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: komando-mobile
  datasource:
    url: jdbc:mysql://localhost:3306/komandomobiledb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      show-sql: true
      database-platform: org.hibernate.dialect.MySQL8Dialect
  jackson:
    date-format: MM dd, yyyy hh:mm a
    time-zone: GMT+08:00
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.russel.komandosb.data.model.event

firebase:
  service-account-path: serviceAccountKey.json
