server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: komando-mobile
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/komandomobiledb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false} #for local, use localhost:3306
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}} #${DB_USER}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}} #${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      show-sql: true
      database-platform: org.hibernate.dialect.MySQL8Dialect
  jackson:
    date-format: MM dd, yyyy hh:mm a
    time-zone: GMT+08:00
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092} # if running on the app on Docker, use kafka:9092 ==============================
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
